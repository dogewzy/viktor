<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
    <meta name="referrer" content="no-referrer">
    <title>{{ title }} · Viktor</title>
    <style>
        :root {
            --bg: #f7f8fa;
            --card-bg: #ffffff;
            --fg: #1f2328;
            --muted: #656d76;
            --border: #d0d7de;
            --accent: #2563eb;
            --code-bg: #f3f4f6;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0d1117;
                --card-bg: #161b22;
                --fg: #e6edf3;
                --muted: #8b949e;
                --border: #30363d;
                --accent: #58a6ff;
                --code-bg: #1e242c;
            }
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", Roboto, sans-serif;
            font-size: 15px;
            line-height: 1.7;
        }
        .wrap {
            max-width: 880px;
            margin: 0 auto;
            padding: 24px 16px 64px;
        }
        header {
            margin-bottom: 16px;
        }
        header h1 {
            margin: 0 0 8px;
            font-size: 22px;
            font-weight: 600;
        }
        header .meta {
            color: var(--muted);
            font-size: 13px;
        }
        header .meta span + span::before {
            content: " · ";
            margin: 0 4px;
        }
        article {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px 28px;
            overflow-wrap: break-word;
            word-break: break-word;
        }
        article h1, article h2, article h3, article h4 {
            margin: 1.4em 0 0.6em;
            line-height: 1.3;
            font-weight: 600;
        }
        article h1 { font-size: 22px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
        article h2 { font-size: 18px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
        article h3 { font-size: 16px; }
        article h4 { font-size: 15px; }
        article p { margin: 0.6em 0; }
        article ul, article ol { padding-left: 1.6em; margin: 0.6em 0; }
        article li { margin: 0.2em 0; }
        article code {
            background: var(--code-bg);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 0.9em;
        }
        article pre {
            background: var(--code-bg);
            padding: 12px 14px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 0.9em;
            line-height: 1.5;
        }
        article pre code {
            background: transparent;
            padding: 0;
        }
        article table {
            border-collapse: collapse;
            margin: 0.8em 0;
            width: 100%;
            font-size: 0.95em;
        }
        article th, article td {
            border: 1px solid var(--border);
            padding: 6px 10px;
            text-align: left;
            vertical-align: top;
        }
        article th { background: var(--code-bg); font-weight: 600; }
        article a { color: var(--accent); text-decoration: none; }
        article a:hover { text-decoration: underline; }
        article blockquote {
            margin: 0.8em 0;
            padding: 4px 14px;
            border-left: 3px solid var(--border);
            color: var(--muted);
        }
        article hr {
            border: 0;
            border-top: 1px solid var(--border);
            margin: 1.5em 0;
        }
        footer {
            margin-top: 24px;
            text-align: center;
            color: var(--muted);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <header>
            <h1>{{ title }}</h1>
            <div class="meta">
                <span>项目：{{ project_id }}</span>
                {% if created_at %}<span>生成于 {{ created_at }}</span>{% endif %}
                {% if expires_at %}<span>有效期至 {{ expires_at }}</span>{% endif %}
            </div>
        </header>
        <article>
            {{ html_body | safe }}
        </article>
        <footer>Powered by Viktor</footer>
    </div>
</body>
</html>
